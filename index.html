<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="logo.png">
    <title>REI LIST App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

       <!-- SCHERMATA DI AUTENTICAZIONE (LOGIN / REGISTRAZIONE) -->
    <section id="auth-section" class="section hidden">
        <div class="sticky-header" style="position: static; border-bottom: none; padding: 10px 0;">
            <div class="back-btn" onclick="ui.navigaA('inventory')">← Annulla e torna a Crea Lista</div>
        </div>
        
        <div class="logo-container" style="margin: 20px 0;">
            <img src="logo.png" alt="REI Logo" class="main-logo">
            <h1 style="color: #ffffff; font-size: 18px; margin-top: 10px; font-weight: bold; letter-spacing: 1px;">ACCESSO CLIENTI</h1>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 15px; background: #111; padding: 20px; border-radius: 12px; border: 1px solid #222;">
            <div>
                <label style="display: block; font-size: 12px; color: #666; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Email</label>
                <input type="email" id="auth-email" placeholder="inserisci la tua email..." style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none;">
            </div>
            
            <div>
                <label style="display: block; font-size: 12px; color: #666; margin-bottom: 5px; text-transform: uppercase; font-weight: bold;">Password</label>
                <input type="password" id="auth-password" placeholder="inserisci la tua password..." style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; outline: none;">
            </div>
            
            <button class="menu-btn" onclick="ui.showToast('Accesso in corso...')" style="background: #ff1e00; text-align: center; padding: 15px; margin-top: 10px; border: none; width: 100%; color: #fff;">🔑 ACCEDI</button>
            <button class="btn-clear" onclick="ui.showToast('Registrazione in corso...')" style="width: 100%; padding: 10px; border-color: #333; color: #aaa;">📝 REGISTRATI ORA</button>
        </div>
    </section>


    <!-- SEZIONE DASHBOARD (HOME) -->
    <section id="dashboard-section" class="section">
        <div class="logo-container" style="text-align: center; margin: 40px 0; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <img src="logo.png" alt="REI Logo" class="main-logo" style="max-width: 180px; height: auto; margin-bottom: 5px;">
            <span style="color: #ffffff; font-size: 22px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase;">REI LIST</span>
            <span id="app-title" style="color: #ff1e00; font-size: 11px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; background: #111; padding: 3px 10px; border-radius: 20px; border: 1px solid #222;">LITE</span>
        </div>
        <div class="menu-grid">
            <button class="menu-btn" onclick="ui.showSection('inventory')">📝 CREA LISTA</button>
            <button class="menu-btn" onclick="ui.showSection('reference')" style="background: #222; border: 1px solid #333; color: #fff;">🖼️ ARCHIVIO REFERENCE</button>
        </div>
    </section>

      <!-- SEZIONE MAGAZZINO (CREA LISTA) -->
    <section id="inventory-section" class="section hidden">
        <div class="sticky-header">
            <!-- TESTATA COMPATTA IN ALTO -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 8px;">
                <div class="back-btn" onclick="ui.showSection('dashboard')" style="margin-bottom: 0; min-width: 70px;">← Indietro</div>
                
                <!-- PULSANTI INCROCIATI ATTIVATI -->
                <div style="display: flex; background: #111; padding: 3px; border-radius: 8px; border: 1px solid #222;">
                    <button onclick="ui.navigaA('reference')" style="background: transparent; border: none; color: #666; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;">Reference</button>
                    <button style="background: #ff1e00; border: none; color: #fff; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Lista</button>
                </div>

                <button id="pro-badge" class="btn-pro-badge" onclick="ui.proponiSblocco()" style="margin: 0; font-size: 11px; padding: 6px 10px;">⭐ PASSA A PRO</button>
            </div>
            
            <!-- GRIGLIA UNIFORMATA DEI DATABASE -->
            <div class="db-selector-grid">
                <button class="btn-db active" onclick="ui.cambiaDatabase('magazzino_studio.csv')">🏠 STUDIO</button>
                <button class="btn-db" onclick="ui.cambiaDatabase('magazzino_location.csv')">📍 LOCATION 🔒</button>
                <button class="btn-db" onclick="ui.cambiaDatabase('magazzino_digitale.csv')">💻 DIGITAL 🔒</button>
                <button class="btn-db" onclick="ui.cambiaDatabase('magazzino_produzione.csv')">📦 PRODUZ 🔒</button>
                <button class="btn-db" onclick="ui.cambiaDatabase('magazzino_completo.csv')">🔋 TUTTO 🔒</button>
            </div>

            <div class="search-container">
                <input type="text" id="searchGear" placeholder="Cerca nel database attivo..." oninput="ui.filterGear()">
                <span class="star-search-btn" id="starFilterBtn" onclick="ui.toggleStarFilter()">☆</span>
                <span class="clear-search" onclick="ui.clearSearch()">×</span>
            </div>
        </div>

        <ul id="gear-list"></ul>

        <div id="selection-footer" class="selection-footer">
            <div class="footer-header">
                <h3>Lista Noleggio (<span id="count">0</span>)</h3>
                <button class="btn-share" onclick="ui.shareList()">Condividi Elenco</button>
            </div>
            <div id="added-items-summary">Nessun elemento selezionato</div>
            <div style="text-align: right; margin-top: 10px;">
                <button class="btn-clear" onclick="ui.clearList()">Svuota Elenco</button>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>
    </section>

    <!-- SEZIONE ARCHIVIO REFERENCE -->
    <section id="reference-section" class="section hidden">
        <div class="sticky-header" style="position: static; border-bottom: 1px solid #222; padding-bottom: 15px;">
            <!-- TESTATA COMPATTA SPECULARE -->
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 8px;">
                <div class="back-btn" onclick="ui.showSection('dashboard')" style="margin-bottom: 0; min-width: 70px;">← Indietro</div>
                
                <!-- PULSANTI INCROCIATI ATTIVATI -->
                <div style="display: flex; background: #111; padding: 3px; border-radius: 8px; border: 1px solid #222;">
                    <button style="background: #ff1e00; border: none; color: #fff; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Reference</button>
                    <button onclick="ui.navigaA_DaReferenceALista()" style="background: transparent; border: none; color: #666; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;">Lista</button>
                </div>

                <button class="btn-pro-badge" onclick="ui.showToast('🔒 Registrazione disponibile nella versione finale online')" style="margin: 0; font-size: 11px; padding: 6px 10px;">⭐ PASSA A PRO</button>
            </div>
            
            <h2 style="color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 5px;">Archivio Ispirazioni</h2>
            <p style="color: #666; font-size: 12px; margin-bottom: 15px;">Carica le foto di riferimento da consultare sul set.</p>
            
            <input type="file" id="ref-file-input" accept="image/*" multiple onchange="ui.caricaImmaginiReference(event)" style="display: none;">
            <button class="menu-btn" onclick="document.getElementById('ref-file-input').click()" style="background: #ff1e00; width: 100%; border: none; padding: 12px; font-weight: bold; color: #fff; font-size: 13px;">➕ CARICA IMMAGINI</button>
        </div>

        <div id="reference-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 0;"></div>
    </section>

    <!-- FINESTRA POP-UP IN TRASPARENZA (NOME LISTA) -->
    <div id="job-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: #111; border: 1px solid #222; width: 100%; max-width: 320px; padding: 25px 20px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <label style="display: block; font-size: 11px; color: #666; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; margin-bottom: 12px;">Titolo della Production</label>
            <input type="text" id="job-name-input" placeholder="" style="width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 14px; border-radius: 10px; font-size: 14px; text-align: center; outline: none; font-weight: bold; margin-bottom: 20px;">
            <button class="menu-btn" onclick="ui.confermaNomeLavoro()" style="background: #ff1e00; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; border: none; font-size: 14px; cursor: pointer; color: #fff;">INIZIA LISTA 🚀</button>
        </div>
    </div>

    <!-- UPDATE CACHE PER I BOTTONI ATTIVI -->
    <script src="app.js?v=tasto_annulla_diretto_ok"></script>
</body>
</html>
